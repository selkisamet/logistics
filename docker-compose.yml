# Yerel geliştirme için PostgreSQL.
# Çalıştır: docker compose up -d
# Bağlantı: postgresql://postgres:postgres@localhost:5432/lojistik?schema=public
services:
  db:
    image: postgres:16-alpine
    container_name: lojistik-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lojistik
    ports:
      - '5432:5432'
    volumes:
      - lojistik_pgdata:/var/lib/postgresql/data

volumes:
  lojistik_pgdata:
